
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f8;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .card-body {
      padding: 15px;
    }
    .card-body h3 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #333;
    }
    .card-body p {
      margin: 5px 0;
      font-size: 14px;
      color: #555;
    }
    .back-btn {
      display: inline-block;
      margin: 20px auto;
      padding: 12px 25px;
      background: #5b9bd5;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.3s ease;
    }
    .back-btn:hover {
      background: #4a89c7;
    }
    .btn-wrapper {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Uploaded Products</h2>

    <div class="gallery">
      {% for product in products %}
        <div class="card">
          {% if product.images %}
            <img src="{{ url_for('static', filename=product.images[0]) }}" alt="Product Image">
          {% else %}
            <img src="{{ url_for('static', filename='placeholder.jpg') }}" alt="No Image">
          {% endif %}
          <div class="card-body">
            <h3>{{ product.name }}</h3>
            <p><strong>Brand:</strong> {{ product.brand }}</p>
            <p><strong>Size:</strong> {{ product.size }}</p>
            <p><strong>Price:</strong> ${{ "%.2f"|format(product.price) }}</p>
            <p><strong>Description:</strong> {{ product.description }}</p>
          </div>
        </div>
      {% endfor %}
    </div>

    <div class="btn-wrapper">
      <a href="{{ url_for('upload_product') }}" class="back-btn">⬅ Back to Upload</a>
    </div>
  </div>
</body>
</html>
